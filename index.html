<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Buy Me A Coffee — Web3 Edition</title>
  <meta name="description" content="Support your favorite creators with crypto. Retro-futuristic Web3 tipping." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.2/ethers.umd.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════════════════
       RETRO FUTURISM — SYNTHWAVE / CRT TERMINAL DESIGN
       ═══════════════════════════════════════════════════════ */
    :root {
      --neon-pink: #ff2d95;
      --neon-cyan: #00f0ff;
      --neon-purple: #b026ff;
      --neon-yellow: #ffe156;
      --neon-green: #39ff14;
      --neon-orange: #ff6e27;

      --chrome: #c0c0d8;
      --chrome-dark: #8888a8;

      --bg-void: #0a0a12;
      --bg-panel: #0e0e1a;
      --bg-surface: #121225;
      --bg-card: rgba(14, 14, 26, 0.85);

      --grid-line: rgba(0, 240, 255, 0.04);

      --text-bright: #eeeef8;
      --text-mid: #9898b8;
      --text-dim: #4a4a6a;

      --scanline: rgba(0, 0, 0, 0.12);

      --glow-pink: 0 0 20px rgba(255, 45, 149, 0.4), 0 0 60px rgba(255, 45, 149, 0.15);
      --glow-cyan: 0 0 20px rgba(0, 240, 255, 0.4), 0 0 60px rgba(0, 240, 255, 0.15);
      --glow-purple: 0 0 20px rgba(176, 38, 255, 0.3), 0 0 60px rgba(176, 38, 255, 0.1);

      --border-neon: 1px solid rgba(0, 240, 255, 0.15);
      --border-pink: 1px solid rgba(255, 45, 149, 0.2);

      --radius: 2px;
      --transition: 0.25s ease;
    }

    /* ── RESET ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Rajdhani', 'Segoe UI', sans-serif;
      background: var(--bg-void);
      color: var(--text-bright);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ═══ PERSPECTIVE GRID FLOOR ═══ */
    .grid-floor {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 45vh;
      background:
        linear-gradient(transparent 0%, var(--bg-void) 100%),
        repeating-linear-gradient(90deg,
          rgba(0, 240, 255, 0.07) 0px,
          transparent 1px,
          transparent 60px),
        repeating-linear-gradient(0deg,
          rgba(0, 240, 255, 0.07) 0px,
          transparent 1px,
          transparent 40px);
      transform: perspective(500px) rotateX(55deg);
      transform-origin: bottom;
      pointer-events: none;
      z-index: 0;
      animation: gridScroll 8s linear infinite;
    }

    @keyframes gridScroll {
      0% {
        background-position: 0 0, 0 0, 0 0;
      }

      100% {
        background-position: 0 0, 0 0, 0 40px;
      }
    }

    /* ═══ SUN / HORIZON ═══ */
    .retro-sun {
      position: fixed;
      bottom: 28vh;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ff2d95 0%, #ff6e27 40%, #ffe156 80%);
      opacity: 0.15;
      filter: blur(30px);
      pointer-events: none;
      z-index: 0;
    }

    .retro-sun::after {
      content: '';
      position: absolute;
      inset: 20%;
      border-radius: 50%;
      background: linear-gradient(180deg, #ff2d95 0%, #ffe156 100%);
      opacity: 0.4;
      filter: blur(10px);
    }

    /* ═══ HORIZONTAL SCAN LINES (CRT EFFECT) ═══ */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          var(--scanline) 2px,
          var(--scanline) 4px);
      pointer-events: none;
      z-index: 9999;
      opacity: 0.3;
    }

    /* ═══ FLICKERING VHS NOISE ═══ */
    /* .vhs-noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.02;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      animation: flicker 0.15s infinite;
    }
    @keyframes flicker {
      0% { opacity: 0.02; }
      50% { opacity: 0.04; }
      100% { opacity: 0.02; }
    } */

    /* ═══════════════════════════════════════
       APP LAYOUT
       ═══════════════════════════════════════ */
    .app-shell {
      display: grid;
      grid-template-columns: 310px 1fr;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ═══ SIDEBAR ═══ */
    .sidebar {
      background: var(--bg-panel);
      border-right: var(--border-neon);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .sidebar::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, var(--neon-cyan), transparent 30%, transparent 70%, var(--neon-pink));
      opacity: 0.3;
    }

    /* ── BRAND ── */
    .brand {
      padding: 1.8rem 1.5rem;
      position: relative;
      border-bottom: var(--border-neon);
      background: linear-gradient(180deg, rgba(0, 240, 255, 0.03) 0%, transparent 100%);
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 4px;
    }

    .brand-icon {
      width: 48px;
      height: 48px;
      border: 2px solid var(--neon-cyan);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: var(--glow-cyan);
      position: relative;
      background: var(--bg-void);
    }

    .brand-icon::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 1px solid rgba(0, 240, 255, 0.15);
      border-radius: 1px;
    }

    .brand h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--neon-cyan);
      text-shadow: var(--glow-cyan);
      line-height: 1.3;
    }

    .brand-subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--neon-pink);
      text-shadow: 0 0 10px rgba(255, 45, 149, 0.5);
      margin-top: 4px;
      margin-left: 62px;
    }

    /* ── CREATE BUTTON ── */
    .create-section {
      padding: 1.25rem 1.5rem;
      border-bottom: var(--border-neon);
    }

    .btn-create {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      background: transparent;
      color: var(--neon-pink);
      text-decoration: none;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: 2px solid var(--neon-pink);
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .btn-create::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--neon-pink);
      opacity: 0;
      transition: var(--transition);
    }

    .btn-create:hover {
      color: var(--bg-void);
      box-shadow: var(--glow-pink);
    }

    .btn-create:hover::before {
      opacity: 1;
    }

    .btn-create span {
      position: relative;
      z-index: 1;
    }

    .btn-create:active {
      transform: scale(0.97);
    }

    .plus-icon {
      width: 22px;
      height: 22px;
      border: 1px solid currentColor;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      position: relative;
      z-index: 1;
    }

    /* ── DIRECTORY LIST ── */
    .list-header {
      padding: 12px 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: var(--border-neon);
      background: rgba(0, 240, 255, 0.02);
    }

    .list-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--text-dim);
    }

    .list-count {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--neon-cyan);
      border: 1px solid rgba(0, 240, 255, 0.2);
      padding: 2px 12px;
      border-radius: var(--radius);
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
    }

    .list-container {
      flex-grow: 1;
      overflow-y: auto;
      padding: 6px;
    }

    .list-container::-webkit-scrollbar {
      width: 3px;
    }

    .list-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .list-container::-webkit-scrollbar-thumb {
      background: rgba(0, 240, 255, 0.2);
      border-radius: 3px;
    }

    .creator-item {
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2px;
      position: relative;
    }

    .creator-item:hover {
      background: rgba(0, 240, 255, 0.04);
      border-color: rgba(0, 240, 255, 0.08);
    }

    .creator-item.active {
      background: rgba(255, 45, 149, 0.06);
      border-color: rgba(255, 45, 149, 0.2);
    }

    .creator-item.active::before {
      content: '▸';
      position: absolute;
      left: 4px;
      color: var(--neon-pink);
      font-size: 0.7rem;
      text-shadow: 0 0 6px rgba(255, 45, 149, 0.5);
    }

    .creator-item.active .creator-name {
      color: var(--neon-pink);
    }

    .creator-avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-weight: 700;
      font-size: 0.7rem;
      color: var(--bg-void);
      flex-shrink: 0;
      position: relative;
    }

    .creator-avatar.v1 {
      background: var(--neon-cyan);
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
    }

    .creator-avatar.v2 {
      background: var(--neon-pink);
      box-shadow: 0 0 10px rgba(255, 45, 149, 0.3);
    }

    .creator-avatar.v3 {
      background: var(--neon-green);
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
    }

    .creator-avatar.v4 {
      background: var(--neon-yellow);
      box-shadow: 0 0 10px rgba(255, 225, 86, 0.3);
    }

    .creator-info {
      min-width: 0;
    }

    .creator-name {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-bright);
      transition: var(--transition);
    }

    .creator-addr {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ═══ MAIN PANEL ═══ */
    .main-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .top-bar {
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: var(--border-neon);
      background: rgba(14, 14, 26, 0.9);
      backdrop-filter: blur(10px);
      z-index: 5;
    }

    .network-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-mid);
    }

    .network-dot {
      width: 8px;
      height: 8px;
      background: var(--neon-green);
      box-shadow: 0 0 8px rgba(57, 255, 20, 0.6);
      animation: blink-dot 2s infinite;
    }

    .network-dot.diamond {
      transform: rotate(45deg);
    }

    @keyframes blink-dot {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .btn-connect {
      padding: 10px 24px;
      background: transparent;
      color: var(--neon-cyan);
      border: 1px solid var(--neon-cyan);
      border-radius: var(--radius);
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn-connect::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--neon-cyan);
      opacity: 0;
      transition: var(--transition);
    }

    .btn-connect:hover {
      color: var(--bg-void);
      box-shadow: var(--glow-cyan);
    }

    .btn-connect:hover::before {
      opacity: 1;
    }

    .btn-connect span {
      position: relative;
      z-index: 1;
    }

    .btn-connect:active {
      transform: scale(0.97);
    }

    .wallet-dot {
      width: 10px;
      height: 10px;
      border: 2px solid currentColor;
      border-radius: 50%;
      position: relative;
      z-index: 1;
    }

    /* ═══ CONTENT ═══ */
    .content-area {
      flex: 1;
      padding: 2.5rem;
      overflow-y: auto;
      background: var(--bg-void);
      position: relative;
    }

    .content-area::-webkit-scrollbar {
      width: 5px;
    }

    .content-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .content-area::-webkit-scrollbar-thumb {
      background: rgba(0, 240, 255, 0.1);
      border-radius: 5px;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
    }

    .empty-icon-wrap {
      position: relative;
      margin-bottom: 2rem;
    }

    .empty-icon {
      width: 120px;
      height: 120px;
      border: 2px solid rgba(0, 240, 255, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      position: relative;
      animation: floatIdle 4s ease-in-out infinite;
    }

    .empty-icon::after {
      content: '';
      position: absolute;
      inset: -15px;
      border: 1px solid rgba(255, 45, 149, 0.1);
      border-radius: 50%;
      animation: spinRing 20s linear infinite;
    }

    .corner-mark {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--neon-pink);
      border-style: solid;
      opacity: 0.4;
    }

    .corner-mark.tl {
      top: -25px;
      left: -25px;
      border-width: 2px 0 0 2px;
    }

    .corner-mark.tr {
      top: -25px;
      right: -25px;
      border-width: 2px 2px 0 0;
    }

    .corner-mark.bl {
      bottom: -25px;
      left: -25px;
      border-width: 0 0 2px 2px;
    }

    .corner-mark.br {
      bottom: -25px;
      right: -25px;
      border-width: 0 2px 2px 0;
    }

    @keyframes floatIdle {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes spinRing {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .empty-state h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--neon-cyan);
      text-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
      margin-bottom: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .empty-state p {
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-dim);
      font-size: 0.8rem;
      max-width: 320px;
      line-height: 1.6;
    }

    /* ═══════════════════════════════════════
       CREATOR PROFILE VIEW
       ═══════════════════════════════════════ */
    .profile-header {
      margin-bottom: 2.5rem;
      position: relative;
    }

    .profile-header::before {
      content: '//  ACTIVE PROFILE';
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--text-dim);
      display: block;
      margin-bottom: 12px;
    }

    .profile-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-bright);
      line-height: 1.1;
      word-break: break-word;
      position: relative;
      display: inline-block;
    }

    .profile-name::after {
      content: '';
      display: block;
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, var(--neon-pink), transparent);
      margin-top: 12px;
      box-shadow: 0 0 10px rgba(255, 45, 149, 0.4);
    }

    .profile-addr {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--neon-cyan);
      border: 1px solid rgba(0, 240, 255, 0.15);
      padding: 6px 14px;
      border-radius: var(--radius);
      display: inline-block;
      margin-top: 16px;
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
      transition: var(--transition);
    }

    .profile-addr:hover {
      border-color: var(--neon-cyan);
      box-shadow: var(--glow-cyan);
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start;
    }

    /* ═══ COFFEE CARD ═══ */
    .coffee-card {
      background: var(--bg-card);
      border: var(--border-neon);
      border-radius: var(--radius);
      padding: 2rem;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      transition: var(--transition);
    }

    .coffee-card:hover {
      border-color: rgba(0, 240, 255, 0.25);
    }

    .coffee-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
      opacity: 0.5;
    }

    .coffee-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon-pink) 50%, transparent);
      opacity: 0.3;
    }

    /* ── Decorative corners ── */
    .card-corner {
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--neon-cyan);
      border-style: solid;
      opacity: 0.3;
    }

    .card-corner.tl {
      top: 6px;
      left: 6px;
      border-width: 1px 0 0 1px;
    }

    .card-corner.tr {
      top: 6px;
      right: 6px;
      border-width: 1px 1px 0 0;
    }

    .card-corner.bl {
      bottom: 6px;
      left: 6px;
      border-width: 0 0 1px 1px;
    }

    .card-corner.br {
      bottom: 6px;
      right: 6px;
      border-width: 0 1px 1px 0;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(0, 240, 255, 0.08);
    }

    .card-header-icon {
      font-size: 1.2rem;
    }

    .card-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-mid);
    }

    /* ── OWNER PANEL ── */
    .owner-panel {
      display: none;
      margin-bottom: 1.5rem;
      padding: 1.25rem;
      background: rgba(255, 225, 86, 0.04);
      border: 1px solid rgba(255, 225, 86, 0.15);
      border-radius: var(--radius);
      position: relative;
    }

    .owner-panel::before {
      content: '◆ ADMIN';
      font-family: 'Orbitron', sans-serif;
      font-size: 0.5rem;
      letter-spacing: 2px;
      color: var(--neon-yellow);
      text-shadow: 0 0 6px rgba(255, 225, 86, 0.4);
      display: block;
      margin-bottom: 8px;
    }

    .owner-desc {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    /* ── FORM ── */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-dim);
    }

    .input-field {
      width: 100%;
      padding: 12px 14px;
      background: rgba(0, 240, 255, 0.03);
      border: 1px solid rgba(0, 240, 255, 0.1);
      border-radius: var(--radius);
      color: var(--text-bright);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      transition: var(--transition);
      outline: none;
    }

    .input-field::placeholder {
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
    }

    .input-field:focus {
      border-color: var(--neon-cyan);
      background: rgba(0, 240, 255, 0.06);
      box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.08), inset 0 0 20px rgba(0, 240, 255, 0.03);
    }

    textarea.input-field {
      resize: vertical;
      min-height: 80px;
    }

    .btn-buy {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--neon-pink);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 2px solid var(--neon-pink);
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 8px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .btn-buy::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--neon-pink);
      opacity: 0;
      transition: var(--transition);
    }

    .btn-buy span {
      position: relative;
      z-index: 1;
    }

    .btn-buy:hover {
      color: var(--bg-void);
      box-shadow: var(--glow-pink);
    }

    .btn-buy:hover::before {
      opacity: 1;
    }

    .btn-buy:active {
      transform: scale(0.97);
    }

    .btn-buy:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn-buy:disabled:hover::before {
      opacity: 0;
    }

    .btn-buy:disabled:hover {
      color: var(--neon-pink);
    }

    .btn-withdraw {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--neon-yellow);
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid var(--neon-yellow);
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-withdraw:hover {
      background: var(--neon-yellow);
      color: var(--bg-void);
      box-shadow: 0 0 20px rgba(255, 225, 86, 0.3);
    }

    .btn-withdraw:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ═══ SUPPORTERS ═══ */
    .supporters-section {
      background: var(--bg-card);
      border: var(--border-pink);
      border-radius: var(--radius);
      padding: 2rem;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .supporters-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
      opacity: 0.5;
    }

    .supporters-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .supporters-grid::-webkit-scrollbar {
      width: 3px;
    }

    .supporters-grid::-webkit-scrollbar-track {
      background: transparent;
    }

    .supporters-grid::-webkit-scrollbar-thumb {
      background: rgba(255, 45, 149, 0.15);
      border-radius: 3px;
    }

    .memo-card {
      padding: 14px 16px;
      background: rgba(0, 240, 255, 0.02);
      border: 1px solid rgba(0, 240, 255, 0.06);
      border-left: 2px solid var(--neon-pink);
      border-radius: var(--radius);
      transition: var(--transition);
      animation: terminalIn 0.3s ease forwards;
      position: relative;
    }

    .memo-card:hover {
      background: rgba(0, 240, 255, 0.05);
      border-color: rgba(0, 240, 255, 0.12);
    }

    @keyframes terminalIn {
      from {
        opacity: 0;
        transform: translateX(-8px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .memo-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .memo-indicator {
      width: 6px;
      height: 6px;
      flex-shrink: 0;
    }

    .memo-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--neon-cyan);
      text-shadow: 0 0 6px rgba(0, 240, 255, 0.3);
    }

    .memo-msg {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--text-mid);
      padding-left: 16px;
    }

    /* ═══ TOAST ═══ */
    #toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--bg-surface);
      color: var(--text-bright);
      padding: 14px 24px;
      border-radius: var(--radius);
      border: var(--border-neon);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transform: translateY(150%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10000;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #toast::before {
      content: '▸';
      color: var(--neon-green);
      text-shadow: 0 0 6px rgba(57, 255, 20, 0.5);
    }

    #toast.show {
      transform: translateY(0);
    }

    #toast.error::before {
      content: '✕';
      color: var(--neon-pink);
      text-shadow: 0 0 6px rgba(255, 45, 149, 0.5);
    }

    /* ═══ LOADERS ═══ */
    .retro-loader {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding: 2rem;
    }

    .retro-loader .bar {
      width: 4px;
      height: 20px;
      background: var(--neon-cyan);
      box-shadow: 0 0 6px rgba(0, 240, 255, 0.4);
      animation: eqBounce 1s ease-in-out infinite;
    }

    .retro-loader .bar:nth-child(1) {
      animation-delay: 0s;
    }

    .retro-loader .bar:nth-child(2) {
      animation-delay: 0.15s;
      height: 28px;
      background: var(--neon-pink);
      box-shadow: 0 0 6px rgba(255, 45, 149, 0.4);
    }

    .retro-loader .bar:nth-child(3) {
      animation-delay: 0.3s;
    }

    .retro-loader .bar:nth-child(4) {
      animation-delay: 0.45s;
      height: 24px;
      background: var(--neon-purple);
      box-shadow: 0 0 6px rgba(176, 38, 255, 0.4);
    }

    .retro-loader .bar:nth-child(5) {
      animation-delay: 0.6s;
    }

    @keyframes eqBounce {

      0%,
      100% {
        transform: scaleY(0.4);
      }

      50% {
        transform: scaleY(1);
      }
    }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 1024px) {
      .action-grid {
        grid-template-columns: 1fr;
      }

      .profile-name {
        font-size: 2rem;
      }
    }

    @media (max-width: 768px) {
      .app-shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: var(--border-neon);
        max-height: 42vh;
      }

      .sidebar::after {
        display: none;
      }

      .list-container {
        max-height: 150px;
      }

      .content-area {
        padding: 1.5rem;
      }

      .profile-name {
        font-size: 1.6rem;
      }

      .retro-sun {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- CRT Scan Lines -->
  <div class="scanlines"></div>
  <div class="vhs-noise"></div>

  <!-- Perspective Grid Floor -->
  <div class="grid-floor"></div>

  <!-- Synthwave Sun -->
  <div class="retro-sun"></div>

  <div class="app-shell">

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">
          <div class="brand-icon">☕</div>
          <h1>Buy Me<br>A Coffee</h1>
        </div>
        <div class="brand-subtitle">Web3 Edition</div>
      </div>

      <div class="create-section">
        <a href="https://hackathon-coffee-factoryy.vercel.app/" class="btn-create" id="createProjectBtn">
          <span>Start Project</span>
          <span class="plus-icon">+</span>
        </a>
      </div>

      <div class="list-header">
        <span class="list-label">Directory</span>
        <span class="list-count" id="creatorCount">—</span>
      </div>
      <div id="creatorsList" class="list-container">
        <div class="retro-loader">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
      </div>
    </aside>

    <!-- ═══ MAIN PANEL ═══ -->
    <main class="main-panel">
      <div class="top-bar">
        <div class="network-badge">
          <div class="network-dot diamond" id="networkDot"></div>
          <span id="statusIndicator">SEPOLIA_TESTNET</span>
        </div>
        <button id="connectButton" class="btn-connect">
          <span class="wallet-dot"></span>
          <span>Connect Wallet</span>
        </button>
      </div>

      <div class="content-area">

        <!-- Empty State -->
        <div id="emptyState" class="empty-state">
          <div class="empty-icon-wrap">
            <div class="empty-icon">☕</div>
            <div class="corner-mark tl"></div>
            <div class="corner-mark tr"></div>
            <div class="corner-mark bl"></div>
            <div class="corner-mark br"></div>
          </div>
          <h2>Select a Creator</h2>
          <p>> Choose a project from the directory to support them with crypto_</p>
        </div>

        <!-- Loaded Content -->
        <div id="loadedContent" style="display: none;">
          <div class="profile-header">
            <div id="artistNameDisplay" class="profile-name">Artist Name</div>
            <div id="artistAddressDisplay" class="profile-addr">0x000...000</div>
          </div>

          <div class="action-grid">
            <!-- Buy Coffee Card -->
            <div>
              <div class="coffee-card">
                <div class="card-corner tl"></div>
                <div class="card-corner tr"></div>
                <div class="card-corner bl"></div>
                <div class="card-corner br"></div>

                <div class="card-header">
                  <span class="card-header-icon">☕</span>
                  <span class="card-title">Buy a Coffee</span>
                </div>

                <!-- Owner Panel -->
                <div id="ownerPanel" class="owner-panel">
                  <p class="owner-desc">Balance accumulates here. Withdraw anytime.</p>
                  <button id="withdrawBtn" class="btn-withdraw">Withdraw Funds</button>
                </div>

                <div class="form-group">
                  <label class="form-label">Your Name</label>
                  <input id="nameInput" class="input-field" placeholder="e.g. Satoshi">
                </div>

                <div class="form-group">
                  <label class="form-label">Message</label>
                  <textarea id="messageInput" class="input-field" rows="3"
                    placeholder="> Great work! Keep building_"></textarea>
                </div>

                <div class="form-group">
                  <label class="form-label">Amount (ETH)</label>
                  <input id="amountInput" type="number" step="0.001" value="0.001" class="input-field">
                </div>

                <button id="buyButton" class="btn-buy"><span>Send Coffee ☕</span></button>
              </div>
            </div>

            <!-- Supporters Column -->
            <div>
              <div class="supporters-section">
                <div class="card-header">
                  <span class="card-header-icon">💬</span>
                  <span class="card-title">Recent Supporters</span>
                </div>
                <div id="memosList" class="supporters-grid"></div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>

  </div>

  <div id="toast" class="success">Transaction Sent!</div>

  <script>
    // ═══════════════════════════════════════════════════════
    // CONFIGURATION
    // ═══════════════════════════════════════════════════════
    const FACTORY_ADDRESS = "0xE992790cCe6cA04dc5CeD8E2E69C5a26B92d4a13";
    const FACTORY_ABI = ["function getAllContracts() external view returns (address[] memory)"];

    const COFFEE_ABI = [
      "function buyCoffee(string name, string message) payable",
      "function getAllCoffees() view returns (tuple(string name, string message)[])",
      "function artistName() view returns (string)",
      "function name() view returns (string)",
      "function withdrawCoffee()",
      "function artist() view returns (address)"
    ];

    // ═══════════════════════════════════════════════════════
    // VARIABLES
    // ═══════════════════════════════════════════════════════
    let provider, signer, factoryContract, currentCoffeeContract;

    // ═══════════════════════════════════════════════════════
    // UI REFS
    // ═══════════════════════════════════════════════════════
    const els = {
      connectBtn: document.getElementById("connectButton"),
      creatorsList: document.getElementById("creatorsList"),
      creatorCount: document.getElementById("creatorCount"),
      emptyState: document.getElementById("emptyState"),
      loadedContent: document.getElementById("loadedContent"),
      artistName: document.getElementById("artistNameDisplay"),
      artistAddr: document.getElementById("artistAddressDisplay"),
      memosList: document.getElementById("memosList"),
      buyBtn: document.getElementById("buyButton"),
      ownerPanel: document.getElementById("ownerPanel"),
      withdrawBtn: document.getElementById("withdrawBtn"),
      toast: document.getElementById("toast"),
      networkDot: document.getElementById("networkDot"),
      statusIndicator: document.getElementById("statusIndicator")
    };

    // ═══════════════════════════════════════════════════════
    // UTILS
    // ═══════════════════════════════════════════════════════
    const avatarVariants = ['v1', 'v2', 'v3', 'v4'];
    const neonColors = ['var(--neon-cyan)', 'var(--neon-pink)', 'var(--neon-green)', 'var(--neon-yellow)'];

    function showToast(msg, type = 'success') {
      els.toast.innerText = msg;
      els.toast.className = type;
      els.toast.classList.add('show');
      setTimeout(() => els.toast.classList.remove('show'), 4000);
    }

    function renderLoader() {
      return '<div class="retro-loader"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>';
    }

    // ═══════════════════════════════════════════════════════
    // LOGIC
    // ═══════════════════════════════════════════════════════

    async function init() {
      if (typeof window.ethereum !== 'undefined') {
        els.connectBtn.onclick = connectWallet;
        const accounts = await window.ethereum.request({ method: 'eth_accounts' });
        if (accounts.length > 0 || localStorage.getItem('walletConnected') === 'true') {
          connectWallet();
        } else {
          els.creatorsList.innerHTML = '<div style="padding:24px; text-align:center; font-family:Share Tech Mono,monospace; font-size:0.75rem; color:var(--text-dim);">> Connect wallet to load directory_</div>';
        }
      } else {
        els.creatorsList.innerHTML = '<div style="padding:24px; text-align:center; font-family:Share Tech Mono,monospace; color:var(--neon-pink); font-size:0.75rem;">> WALLET_REQUIRED_</div>';
        els.connectBtn.innerHTML = '<span class="wallet-dot" style="border-color:var(--neon-orange);"></span><span>Connect Wallet</span>';
        els.connectBtn.onclick = () => {
          showToast("No wallet detected", "error");
        };
        els.networkDot.style.background = 'var(--neon-orange)';
        els.networkDot.style.boxShadow = '0 0 8px rgba(255,110,39,0.6)';
        els.statusIndicator.innerText = 'NO_WALLET';
      }
    }

    async function connectWallet() {
      try {
        provider = new ethers.BrowserProvider(window.ethereum);
        // Try silent check first, only prompt if no accounts
        let accounts = await window.ethereum.request({ method: 'eth_accounts' });
        if (accounts.length === 0) {
          accounts = await provider.send("eth_requestAccounts", []);
        }
        if (accounts.length === 0) { return; }
        signer = await provider.getSigner();

        const network = await provider.getNetwork();
        if (network.chainId !== 11155111n) {
          try {
            await window.ethereum.request({
              method: 'wallet_switchEthereumChain',
              params: [{ chainId: '0xaa36a7' }],
            });
          } catch (switchError) {
            if (switchError.code === 4902) {
              await window.ethereum.request({
                method: 'wallet_addEthereumChain',
                params: [{
                  chainId: '0xaa36a7',
                  chainName: 'Sepolia test network',
                  nativeCurrency: { name: 'SepoliaETH', symbol: 'SEP', decimals: 18 },
                  rpcUrls: ['https://rpc2.sepolia.org'],
                  blockExplorerUrls: ['https://sepolia.etherscan.io']
                }]
              });
            } else {
              throw switchError;
            }
          }
          provider = new ethers.BrowserProvider(window.ethereum);
          signer = await provider.getSigner();
        }

        const addr = await signer.getAddress();
        els.connectBtn.innerHTML = `<span class="wallet-dot" style="border-color:var(--neon-green);"></span><span>${addr.slice(0, 6)}...${addr.slice(-4)}</span>`;
        els.statusIndicator.innerText = 'SEPOLIA_TESTNET';

        localStorage.setItem('walletConnected', 'true');
        loadCreators();
      } catch (e) {
        console.error(e);
        showToast("Connection failed", "error");
      }
    }

    async function loadCreators() {
      try {
        factoryContract = new ethers.Contract(FACTORY_ADDRESS, FACTORY_ABI, signer);
        const addresses = await factoryContract.getAllContracts();

        els.creatorsList.innerHTML = "";
        els.creatorCount.innerText = addresses.length;

        if (addresses.length === 0) {
          els.creatorsList.innerHTML = '<div style="padding:24px; text-align:center; color:var(--text-dim); font-family:Share Tech Mono,monospace; font-size:0.75rem;">> No projects yet_</div>';
          return;
        }

        const reversed = [...addresses].reverse();

        reversed.forEach((addr, index) => {
          const item = document.createElement('div');
          item.className = 'creator-item';
          const variant = avatarVariants[index % avatarVariants.length];
          const titleId = `title-${addr}`;

          item.innerHTML = `
          <div class="creator-avatar ${variant}">${(index + 1).toString().padStart(2, '0')}</div>
          <div class="creator-info">
            <div id="${titleId}" class="creator-name">Loading...</div>
            <div class="creator-addr">${addr.slice(0, 6)}…${addr.slice(-4)}</div>
          </div>
        `;

          item.onclick = () => selectCreator(addr, item);
          els.creatorsList.appendChild(item);
          fetchContractName(addr, titleId);
        });

      } catch (e) {
        console.error(e);
        els.creatorsList.innerHTML = '<div style="padding:24px; color:var(--neon-pink); font-family:Share Tech Mono,monospace; font-size:0.75rem;">> ERR: Failed to load list_</div>';
      }
    }

    async function fetchContractName(address, elementId) {
      try {
        const contract = new ethers.Contract(address, COFFEE_ABI, signer);
        let name = "Unnamed Project";
        try {
          name = await contract.artistName();
        } catch (e) {
          try { name = await contract.name(); } catch (e2) { name = "Project " + address.slice(0, 4); }
        }
        const el = document.getElementById(elementId);
        if (el) el.innerText = name;
      } catch (e) {
        console.log("Name fetch failed for " + address);
      }
    }

    async function selectCreator(address, domItem) {
      document.querySelectorAll('.creator-item').forEach(el => el.classList.remove('active'));
      domItem.classList.add('active');

      els.emptyState.style.display = 'none';
      els.loadedContent.style.display = 'block';

      const sidebarTitle = domItem.querySelector('div[id^="title-"]').innerText;
      els.artistName.innerText = sidebarTitle === "Loading..." ? "Fetching..." : sidebarTitle;
      els.artistAddr.innerText = address;
      els.memosList.innerHTML = renderLoader();

      currentCoffeeContract = new ethers.Contract(address, COFFEE_ABI, signer);

      els.ownerPanel.style.display = 'none';
      try {
        const artistAddress = await currentCoffeeContract.artist();
        const currentUser = await signer.getAddress();
        if (artistAddress.toLowerCase() === currentUser.toLowerCase()) {
          els.ownerPanel.style.display = 'block';
          console.log("Verified Owner.");
        }
      } catch (e) {
        console.log("Ownership check failed: " + e.message);
      }

      loadMemos();
    }

    async function loadMemos() {
      try {
        const memos = await currentCoffeeContract.getAllCoffees();
        els.memosList.innerHTML = "";

        if (memos.length === 0) {
          els.memosList.innerHTML = '<div style="text-align:center; padding:2rem; color:var(--text-dim); font-family:Share Tech Mono,monospace; font-size:0.8rem;">> No supporters yet. Be the first_</div>';
          return;
        }

        [...memos].reverse().forEach((memo, i) => {
          const safeName = memo.name.replace(/</g, "&lt;");
          const safeMsg = memo.message.replace(/</g, "&lt;");
          const color = neonColors[i % neonColors.length];

          const card = document.createElement('div');
          card.className = 'memo-card';
          card.style.animationDelay = `${i * 0.06}s`;
          card.innerHTML = `
          <div class="memo-header">
            <div class="memo-indicator" style="background:${color};box-shadow:0 0 6px ${color};"></div>
            <span class="memo-name">${safeName}</span>
          </div>
          <div class="memo-msg">${safeMsg}</div>
        `;
          els.memosList.appendChild(card);
        });
      } catch (e) {
        els.memosList.innerHTML = '<div style="color:var(--neon-pink); padding:1rem; font-family:Share Tech Mono,monospace;">> ERR: Loading data_</div>';
      }
    }

    // ═══════════════════════════════════════════════════════
    // BUTTON ACTIONS
    // ═══════════════════════════════════════════════════════

    // BUY COFFEE
    els.buyBtn.addEventListener('click', async () => {
      if (!currentCoffeeContract) return;

      const name = document.getElementById("nameInput").value || "Anon";
      const msg = document.getElementById("messageInput").value || "Coffee!";
      const val = document.getElementById("amountInput").value;

      try {
        showToast("Requesting Signature...", "success");
        els.buyBtn.disabled = true;
        els.buyBtn.querySelector('span').innerText = "WAITING...";

        const tx = await currentCoffeeContract.buyCoffee(name, msg, {
          value: ethers.parseEther(val)
        });

        showToast("Tx Sent! Confirming...", "success");
        await tx.wait();

        showToast("Coffee Purchased! ☕", "success");
        document.getElementById("messageInput").value = "";
        loadMemos();
      } catch (e) {
        console.error(e);
        showToast("Transaction Failed", "error");
      } finally {
        els.buyBtn.disabled = false;
        els.buyBtn.querySelector('span').innerText = "Send Coffee ☕";
      }
    });

    // WITHDRAW FUNDS
    els.withdrawBtn.addEventListener('click', async () => {
      if (!currentCoffeeContract) return;

      try {
        showToast("Withdrawing funds...", "success");
        els.withdrawBtn.innerText = "PROCESSING...";
        els.withdrawBtn.disabled = true;

        const tx = await currentCoffeeContract.withdrawCoffee();

        showToast("Withdrawal Tx Sent!", "success");
        await tx.wait();

        showToast("Funds Withdrawn! 🎉", "success");
      } catch (e) {
        console.error(e);
        showToast("Withdrawal Failed", "error");
      } finally {
        els.withdrawBtn.innerText = "WITHDRAW FUNDS";
        els.withdrawBtn.disabled = false;
      }
    });

    init();
  </script>
</body>

</html>
